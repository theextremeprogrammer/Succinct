name: Unit Tests & Deploy Docs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Succinct Tests
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Succinct
        run: |
          xcodebuild -project Succinct.xcodeproj -scheme "Succinct" -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" build-for-testing

      - name: Succinct Unit Tests
        run: |
          xcodebuild -project Succinct.xcodeproj -scheme "Succinct" -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" test-without-building

      - name: Build SuccinctContainer
        run: |
          xcodebuild -project Succinct.xcodeproj -scheme "SuccinctContainer" -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" build-for-testing

      - name: SuccinctContainer Tests
        run: |
          xcodebuild -project Succinct.xcodeproj -scheme "SuccinctContainer" -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" test-without-building

      - name: Generate coverage report
        uses: codecov/codecov-action@v5
        with:
          verbose: true

      - name: Build Documentation
        run: |
          bundle install
          make docs

      - name: Deploy Documentation
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
